name: CD Pipeline
'on':
  push:
    branches:
    - main
    - dev
env:
  AZURE_SUBSCRIPTION_ID: your-subscription-id
  AZURE_RESOURCE_GROUP: project-rg
jobs:
  deploy-database-project-cosmos-0ee8de:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Verify Azure CLI
      run: az --version
    - name: Configure Cosmos DB
      run: "\n                        # Get connection string\n                        CONNECTION_STRING=$(az cosmosdb keys list --name project-cosmos-0ee8de --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --type connection-strings --query 'connectionStrings[0].connectionString' -o tsv)\n                        \n                        # Set as GitHub secret (this would need to be done manually)\n                        echo \"Connection string retrieved for project-cosmos-0ee8de\"\n                        echo \"Please set COSMOSDB_CONNECTION_STRING secret in GitHub repository settings\"\n                    "
  deploy-backend-project-backend-3e77da:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Database Connection String
      run: |
        CONNECTION_STRING=$(az cosmosdb keys list --name project-cosmos-0ee8de --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --type connection-strings --query 'connectionStrings[0].connectionString' -o tsv)
        echo "DATABASE_URL=$CONNECTION_STRING" >> .env
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: project-backend-3e77da
        package: .
    - name: Verify Backend Deployment
      run: curl -f https://project-backend-3e77da.azurewebsites.net/health || curl -f https://project-backend-3e77da.azurewebsites.net/api/health || curl -f https://project-backend-3e77da.azurewebsites.net || echo "Backend endpoint verification failed"
  deploy-frontend-project-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Set Frontend API URL
      run: echo "VITE_API_URL=https://project-backend-3e77da.azurewebsites.net" >> .env.production
    - name: Build frontend
      run: npm run build
    - name: Get Static Web App Token
      id: get-token
      run: |
        TOKEN=$(az staticwebapp secrets list --name project-frontend --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "properties.apiKey" -o tsv)
        echo "SWA_TOKEN=$TOKEN" >> $GITHUB_ENV
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
        repo_token: ${{ github.token }}
        action: upload
        app_location: frontend
        output_location: dist
    - name: Verify Frontend Deployment
      run: curl -f https://project-frontend.azurestaticapps.net || echo "Frontend endpoint verification failed"
