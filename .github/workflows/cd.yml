name: CD Pipeline
'on':
  push:
    branches:
    - main
    - dev
env:
  AZURE_SUBSCRIPTION_ID: your-subscription-id
  AZURE_RESOURCE_GROUP: project-rg
jobs:
  deploy-database-project-cosmos-cb5ebf:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Verify Azure CLI
      run: az --version
    - name: Configure Cosmos DB
      run: "\n                        # Get connection string\n                        CONNECTION_STRING=$(az cosmosdb keys list --name project-cosmos-cb5ebf --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --type connection-strings --query 'connectionStrings[0].connectionString' -o tsv)\n                        \n                        # Set as GitHub secret (this would need to be done manually)\n                        echo \"Connection string retrieved for project-cosmos-cb5ebf\"\n                        echo \"Please set COSMOSDB_CONNECTION_STRING secret in GitHub repository settings\"\n                    "
  deploy-backend-project-backend-3b1952:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - name: Set Database Connection String
      run: echo "DATABASE_URL=${{ secrets.AZURE_COSMOSDB_CONNECTION }}" >> .env
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: project-backend-3b1952
        slot-name: production
        package: .
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}
    - name: Verify Backend Deployment
      run: curl -f https://project-backend-3b1952.azurewebsites.net/health || curl -f https://project-backend-3b1952.azurewebsites.net/api/health || curl -f https://project-backend-3b1952.azurewebsites.net || echo "Backend endpoint verification failed"
